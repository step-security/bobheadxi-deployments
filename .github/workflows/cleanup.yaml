name: cleanup

on:
  pull_request:
    types: [ closed ]

jobs:
  delete-env:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scenario: [ 'success', 'failure' ]
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
      
    # Dependencies
    # https://docs.github.com/en/actions/guides/caching-dependencies-to-speed-up-workflows#example-using-the-cache-action
    - name: Cache node modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      env:
        cache-name: cache-node-modules
      with:
        path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-
    - run: npm install
    - run: npm run build

    - name: extract branch name
      id: get_branch
      shell: bash
      env:
        PR_HEAD: ${{ github.head_ref }}
      run: echo "branch=$(echo ${PR_HEAD#refs/heads/} | tr / -)" >> "$GITHUB_OUTPUT"

    - name: delete environment
      uses: ./
      with:
        step: delete-env
        token: ${{ secrets.GITHUB_TOKEN }}
        env: integration-test-${{ steps.get_branch.outputs.branch }}-${{ matrix.scenario }}
        debug: true
